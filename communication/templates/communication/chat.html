{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Chat - NEXO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1.5rem 2rem;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            background: var(--card-bg);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .message {
            max-width: 80%;
            padding: 1rem;
            border-radius: 1rem;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.received {
            align-self: flex-start;
            background: var(--border);
            border-bottom-left-radius: 0.2rem;
        }

        .message.sent {
            align-self: flex-end;
            background: var(--primary);
            border-bottom-right-radius: 0.2rem;
        }

        .message .user {
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--text-muted);
        }

        .message.sent .user {
            color: rgba(255, 255, 255, 0.8);
            text-align: right;
        }

        .message .text {
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .message .time {
            font-size: 0.7rem;
            margin-top: 0.4rem;
            opacity: 0.6;
            text-align: right;
        }

        .input-area {
            padding: 1.5rem 2rem;
            background: rgba(15, 23, 42, 0.9);
            border-top: 1px solid var(--border);
        }

        .input-container {
            display: flex;
            gap: 1rem;
            background: var(--card-bg);
            padding: 0.5rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .input-container input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 0.75rem 1rem;
            outline: none;
            font-size: 1rem;
        }

        .input-container button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .input-container button:hover {
            background: var(--primary-dark);
        }

        /* Custom Scrollbar */
        .messages-area::-webkit-scrollbar {
            width: 6px;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
    </style>
</head>

<body>
    <header>
        <a href="/" class="logo">NEXO Global Chat</a>
        <div class="user-info">
            Logged in as: <strong>{{ user.username }}</strong>
        </div>
    </header>

    <div class="chat-container">
        <div class="messages-area" id="messages-area">
            {% for message in messages %}
            <div class="message {% if message.user == user %}sent{% else %}received{% endif %}">
                <div class="user">{{ message.user.username }}</div>
                <div class="text">{{ message.content }}</div>
                <div class="time">{{ message.timestamp|date:"H:i" }}</div>
            </div>
            {% endfor %}
        </div>

        <div class="input-area">
            <form id="chat-form" class="input-container">
                {% csrf_token %}
                <input type="text" id="message-input" placeholder="Type your message..." autocomplete="off" required>
                <button type="submit">Send</button>
            </form>
        </div>
    </div>

    <script>
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const messagesArea = document.getElementById('messages-area');
        const roomId = "{{ room.id }}";

        // Scroll to bottom
        function scrollToBottom() {
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        scrollToBottom();

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const content = messageInput.value;
            if (!content) return;

            const formData = new FormData();
            formData.append('content', content);
            formData.append('csrfmiddlewaretoken', document.querySelector('[name=csrfmiddlewaretoken]').value);

            try {
                const response = await fetch(`/global-chat/send/${roomId}/`, {
                    method: 'POST',
                    body: formData
                });
                if (response.ok) {
                    messageInput.value = '';
                    fetchMessages();
                }
            } catch (err) {
                console.error('Error sending message:', err);
            }
        };

        async function fetchMessages() {
            try {
                const response = await fetch(`/global-chat/messages/${roomId}/`);
                const data = await response.json();

                messagesArea.innerHTML = '';
                data.messages.forEach(msg => {
                    const messageDiv = document.createElement('div');
                    messageDiv.className = `message ${msg.is_me ? 'sent' : 'received'}`;
                    messageDiv.innerHTML = `
                        <div class="user">${msg.user}</div>
                        <div class="text">${msg.content}</div>
                        <div class="time">${msg.timestamp}</div>
                    `;
                    messagesArea.appendChild(messageDiv);
                });
                scrollToBottom();
            } catch (err) {
                console.error('Error fetching messages:', err);
            }
        }

        // Poll for new messages every 3 seconds
        setInterval(fetchMessages, 3000);
    </script>
</body>

</html>
