{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NEXO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .login-box {
            width: 100%;
            max-width: 400px;
            margin: auto;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #cbd5e1;
        }

        .form-control {
            width: 100%;
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1rem;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.2);
        }
    </style>
</head>

<body>

    <div class="landing-container">
        <div class="glass-panel login-box animate-entry">
            <h2 style="margin-bottom: 1rem;">Login</h2>

            {% if messages %}
            {% for message in messages %}
            <p
                style="color:{% if message.tags == 'error' %}#ef4444{% else %}#00BFA6{% endif %}; font-size: 0.9rem; margin-bottom: 1rem;">
                {{ message }}</p>
            {% endfor %}
            {% endif %}


            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" name="username" id="username" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" class="form-control" required>
                </div>

                <button type="submit" class="btn-modern btn-primary" style="width: 100%;">Sign In</button>
            </form>

            Don't have an account? <a href="{% url 'main:register' %}" style="color: var(--secondary-color);">Register
                here</a>
            </p>
            <p>
                <a href="{% url 'main:home' %}" style="color: #64748b; font-size: 0.9rem;">Back to Home</a>
            </p>

        </div>
    </div>

</body>

</html>
